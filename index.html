<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Milk Shake Ordering</title>
	</head>
	<body>
		<h1>Blizzard Blast Ordering</h1>
		<form action="http://localhost:3000" method="POST">
			<label for="customer_name">Name: </label>
			<input type="text" name="customer_name" placeholder="Name" />

			<br />

			<div id="milkshakes">
				<div class="milkshake-block" data-index="0">
					<label>Milkshake: </label>
					<select name="milkshake_recipe[]">
						<option value="" disabled selected>Select a Milkshake</option>
						<option value="Cookies & Cream">Cookies & Cream</option>
						<option value="Strawberry">Strawberry</option>
						<option value="Caramel">Caramel</option>
						<option value="Vanilla">Vanilla</option>
					</select>

					<br />

					<div>
						<p>Please select your size</p>
						<label><input type="radio" name="size[0]" value="8oz" /> 8oz</label
						><br />
						<label
							><input type="radio" name="size[0]" value="12oz" /> 12oz</label
						><br />
						<label
							><input type="radio" name="size[0]" value="16oz" /> 16oz</label
						>
					</div>

					<br />

					<button type="button" onclick="addCustomization(this)">
						add customization
					</button>
					<table class="customizations">
						<tr>
							<th>No Customizations Added</th>
						</tr>
					</table>
				</div>
			</div>

			<br />

			<button type="button" onclick="addMilkshake()">
				Add another Milkshake
			</button>

			<br />

			<input type="submit" value="Order" />
		</form>

		<script>
			const milkshakesContainer = document.getElementById("milkshakes");

			let milkshakeCount = 1; // index 0 is the block already in the page

			function addMilkshake() {
				const index = milkshakeCount++;
				const clone = milkshakesContainer
					.querySelector(".milkshake-block")
					.cloneNode(true);

				clone.dataset.index = index;
				clone.querySelector("select").selectedIndex = 0;
				clone.querySelectorAll('input[type="radio"]').forEach((radio) => {
					radio.name = `size[${index}]`;
					radio.checked = false;
				});
				clone.querySelector(".customizations").innerHTML =
					"<tr><th>No Customizations Added</th></tr>";

				milkshakesContainer.appendChild(clone);
			}

			function addCustomization(button) {
				const block = button.closest(".milkshake-block");
				const index = block.dataset.index;
				const table = block.querySelector(".customizations");

				if (table.rows.length === 1) {
					table.innerHTML =
						"<tr><th>Customization</th><th>Quantity per Serving</th></tr>";
				}

				table.insertAdjacentHTML(
					"beforeend",
					`
					<tr>
						<td>
							<select name="customization[${index}][]">
								<option value="" disabled selected>Select a Customization</option>
								<option value="Almonds">Almonds</option>
								<option value="Bananas">Bananas</option>
								<option value="Butterfingers">Butterfingers</option>
								<option value="Cashews">Cashews</option>
								<option value="Cheesecake">Cheesecake</option>
								<option value="Cookie Dough">Cookie Dough</option>
								<option value="Full Cream Milk">Full Cream Milk</option>
								<option value="Mini Marshmallows">Mini Marshmallows</option>
								<option value="Nestle Crunch">Nestle Crunch</option>
								<option value="Oreo">Oreo</option>
								<option value="Soy Milk">Soy Milk</option>
								<option value="Strawberries">Strawberries</option>
								<option value="Vanilla Ice Cream">Vanilla Ice Cream</option>
								<option value="Whipped Cream">Whipped Cream</option>
								<option value="White Choco Chips">White Choco Chips</option>
							</select>
						</td>
						<td>
							<input type="number" name="quantity[${index}][]" />
						</td>
					</tr>
				`,
				);
			}
		</script>
	</body>
</html>
